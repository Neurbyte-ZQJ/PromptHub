services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: sqlite:////app/prompts.db
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
    volumes:
      - ./prompts.db:/app/prompts.db
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
